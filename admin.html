<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — A Bola Maya</title>
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('abm_theme')||'dark')</script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="dashboard.html" class="navbar-brand">
      <div class="brand-bee-wrap">
        <img src="img/logo.png" alt="BM" class="brand-bee"
             onerror="this.parentElement.style.display='none';document.getElementById('nb5').style.display='flex'">
      </div>
      <span class="brand-mark" id="nb5" style="display:none">BM</span>
      A Bola Maya
    </a>
    <div class="navbar-nav">
      <a href="dashboard.html">Início</a>
      <a href="predict.html">Previsões</a>
      <a href="leaderboard.html">Classificação</a>
      <a href="lobby.html">Salas</a>
      <a href="admin.html" class="active" id="navAdminLink">Admin</a>
    </div>
    <div class="navbar-right">
      <button class="theme-toggle" onclick="toggleTheme()" title="Alterar tema">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <div class="avatar" id="navAvatar" title="O meu perfil">?</div>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Sair</button>
    </div>
  </div>
</nav>

<main class="container">
  <div class="page-header">
    <h2>Painel de Admin</h2>
    <p>Introduz resultados reais e calcula pontos automaticamente.</p>
  </div>
  <div id="statsBar" style="display:none" class="admin-stats"></div>
  <div id="adminContent"><div class="loading">A verificar permissões...</div></div>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <span>© 2026 A Bola Maya</span>
    <span class="footer-links">
      <a href="about.html">Sobre</a>
      <a href="information.html">Dados</a>
      <a href="terms.html">Termos</a>
      <a href="support.html">Reportar Problema</a>
    </span>
  </div>
</footer>
<script src="js/api.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/scoring.js"></script>
<script src="js/theme.js"></script>
<script>
let user, allMatches = [], groupMatches = {};

(async () => {
  user = await requireAuth();
  if (!user) return;
  if (!user.is_admin) {
    document.getElementById('adminContent').innerHTML = `
      <div class="card text-center" style="padding:48px">
        <p style="font-size:1.8rem;font-weight:900;color:var(--primary);letter-spacing:-.03em;margin-bottom:8px">Acesso negado</p>
        <p class="muted small">Para te tornar admin, corre no terminal:<br>
        <code style="background:var(--bg);padding:4px 8px;border-radius:4px;display:inline-block;margin-top:8px;font-size:.85rem">node server/make-admin.js ${user.username}</code><br>
        e recarrega a página.</p>
      </div>`;
    return;
  }

  allMatches = await API.get('/matches') || [];
  for (const m of allMatches) {
    if (!groupMatches[m.group_id]) groupMatches[m.group_id] = [];
    groupMatches[m.group_id].push(m);
  }
  renderPanel();
  loadAdminStats();
})();

// ── Panel render ──────────────────────────────────────────────────────────────

function renderPanel() {
  const byDate = {};
  for (const m of allMatches) {
    if (!byDate[m.match_date]) byDate[m.match_date] = [];
    byDate[m.match_date].push(m);
  }

  document.getElementById('adminContent').innerHTML = `
    <div class="tabs" id="adminTabs">
      <button class="tab-btn active" onclick="switchTab('matches',this)">Resultados</button>
      <button class="tab-btn"        onclick="switchTab('groups',this)">Pontos de Grupos</button>
      <button class="tab-btn"        onclick="switchTab('selecoes',this)">Seleções</button>
      <button class="tab-btn"        onclick="switchTab('tickets',this)">Reportes</button>
      <button class="tab-btn"        onclick="switchTab('users',this)">Utilizadores</button>
    </div>

    <!-- ── Tab: Resultados ─────────────────────────────────────────────── -->
    <div id="tabMatches">
      ${Object.entries(byDate).map(([date, ms]) => `
        <div class="card mt-12">
          <div class="card-title">${formatDate(date)}</div>
          ${ms.map(renderAdminMatch).join('')}
        </div>`).join('')}
    </div>

    <!-- ── Tab: Pontos de Grupos ───────────────────────────────────────── -->
    <div id="tabGroups" style="display:none">
      ${ALL_GROUPS.map(g => {
        const ms       = groupMatches[g] || [];
        const finished = ms.filter(m => m.status === 'finished').length;
        const done     = finished === 6;
        return `<div class="card mt-12">
          <div class="flex-between">
            <div class="card-title" style="margin-bottom:0">${GROUP_LABELS[g]}</div>
            <div class="flex gap-8">
              ${done ? '<span class="badge badge-green">Completo</span>' : `<span class="badge badge-muted">${finished}/6</span>`}
              <button class="btn btn-primary btn-sm" onclick="calcGroup('${g}')" ${done ? '' : 'disabled'}>Calcular pontos</button>
            </div>
          </div>
          ${done ? renderActualStandings(g) : ''}
        </div>`;
      }).join('')}
    </div>

    <!-- ── Tab: Seleções ───────────────────────────────────────────────── -->
    <div id="tabSelecoes" style="display:none">

      <div class="card mt-12">
        <div class="flex-between" style="margin-bottom:16px">
          <div class="card-title" style="margin-bottom:0">Estado das Seleções</div>
          <div class="flex gap-8">
            <button class="btn btn-primary btn-sm" onclick="scrapeAll()">Scrape All Teams</button>
            <button class="btn btn-ghost btn-sm"   onclick="loadScrapeStatus()">↺ Atualizar</button>
          </div>
        </div>
        <div id="scrapeStatusContainer">
          <span class="muted small">A carregar...</span>
        </div>
      </div>

      <div class="card mt-12">
        <div class="card-title">Liquidar Previsões Automaticamente</div>
        <p class="muted small" style="margin-bottom:16px">
          Compara os resultados scrapeados com os jogos do Campeonato (por data e equipas).
          Se houver correspondência, marca o jogo como terminado e atribui pontos às previsões ainda por liquidar.
          Previsões já liquidadas não são alteradas.
        </p>
        <button class="btn btn-primary btn-sm" onclick="autoSettle()">Liquidar Previsões</button>
      </div>

      <div class="card mt-12">
        <div class="flex-between" style="margin-bottom:12px">
          <div>
            <div class="card-title" style="margin-bottom:2px">Estatísticas de Jogadores</div>
            <p class="muted small" style="margin:0">
              Manual, nunca automático. Botão <em>🧪</em> testa com 3 jogadores antes do plantel completo.
            </p>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="scrapeAllPlayers()"
            title="Scrape de jogadores para todas as 48 seleções (demora horas)">
            ↺ Todos os Jogadores
          </button>
        </div>
        <div id="pstats-result"></div>
      </div>

    </div>

    <!-- ── Tab: Utilizadores ──────────────────────────────────────────── -->
    <div id="tabUsers" style="display:none">
      <div class="card mt-12">
        <div class="flex-between" style="margin-bottom:14px;gap:10px;flex-wrap:wrap">
          <div class="card-title" style="margin-bottom:0">Utilizadores</div>
          <div class="flex gap-8" style="flex:1;max-width:340px">
            <input type="text" id="userSearch" class="input" style="font-size:.82rem;padding:5px 10px"
              placeholder="Pesquisar por username ou email…"
              oninput="filterUsers()">
            <button class="btn btn-ghost btn-sm" onclick="loadUsers()">↺</button>
          </div>
        </div>
        <div id="userList"><span class="muted small">A carregar...</span></div>
      </div>
    </div>

    <!-- ── Tab: Reportes ──────────────────────────────────────────────── -->
    <div id="tabTickets" style="display:none">
      <div class="card mt-12">
        <div class="flex-between" style="margin-bottom:16px">
          <div class="card-title" style="margin-bottom:0">Reportes de utilizadores</div>
          <div class="flex gap-8">
            <select id="ticketFilter" class="input" style="padding:4px 10px;font-size:.82rem;width:auto" onchange="loadTickets()">
              <option value="">Todos</option>
              <option value="open" selected>Em aberto</option>
              <option value="reviewing">Em análise</option>
              <option value="resolved">Resolvidos</option>
            </select>
            <button class="btn btn-ghost btn-sm" onclick="loadTickets()">↺</button>
          </div>
        </div>
        <div id="ticketList"><span class="muted small">A carregar...</span></div>
      </div>
    </div>`;
}

// ── Tab switching ─────────────────────────────────────────────────────────────

function switchTab(tab, btn) {
  document.querySelectorAll('#adminTabs .tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tabMatches').style.display   = tab === 'matches'  ? '' : 'none';
  document.getElementById('tabGroups').style.display    = tab === 'groups'   ? '' : 'none';
  document.getElementById('tabSelecoes').style.display  = tab === 'selecoes'  ? '' : 'none';
  document.getElementById('tabTickets').style.display   = tab === 'tickets'   ? '' : 'none';
  document.getElementById('tabUsers').style.display     = tab === 'users'     ? '' : 'none';
  if (tab === 'selecoes') loadScrapeStatus();
  if (tab === 'tickets')  loadTickets();
  if (tab === 'users')    loadUsers();
}

// ── Scrape status ─────────────────────────────────────────────────────────────

async function loadScrapeStatus() {
  const el = document.getElementById('scrapeStatusContainer');
  if (!el) return;
  el.innerHTML = '<span class="muted small">A carregar...</span>';
  try {
    const data = await API.get('/national-teams/scrape-status');
    renderScrapeStatus(data, el);
  } catch (e) {
    el.innerHTML = `<span class="form-error">${e.message}</span>`;
  }
}

function renderScrapeStatus(data, el) {
  const { teams, scraped_count, total, last_full_scrape } = data;
  const lastText = last_full_scrape
    ? new Date(last_full_scrape).toLocaleString('pt-PT')
    : 'Nunca';

  const rows = teams.map(t => {
    const hasData  = t.result_count > 0;
    const ageMs    = t.last_scraped ? Date.now() - new Date(t.last_scraped) : null;
    const ageHours = ageMs !== null ? Math.round(ageMs / 36e5) : null;
    const ageTxt   = ageHours !== null
      ? (ageHours < 1 ? '< 1h' : `${ageHours}h atrás`)
      : '—';
    const statusBadge = hasData
      ? `<span class="badge badge-green">${t.result_count} result.</span>`
      : '<span class="badge badge-muted">Sem dados</span>';

    return `<tr>
      <td><a href="team.html?team=${t.slug}" style="font-weight:600;color:var(--primary);text-decoration:none" title="Ver página de ${t.name}">${t.code}</a></td>
      <td>${t.name}</td>
      <td>${statusBadge}</td>
      <td class="muted" style="font-size:.8rem">${ageTxt}</td>
      <td><button class="btn btn-ghost btn-sm" style="padding:2px 8px;font-size:.78rem"
            onclick="scrapeSingle('${t.slug}','${t.name}')">Resultados</button></td>
      <td style="white-space:nowrap">
        <button class="btn btn-ghost btn-sm" style="padding:2px 6px;font-size:.75rem" title="Teste com 3 jogadores"
          onclick="refreshPlayerStats('${t.slug}',true)">🧪</button>
        <button class="btn btn-ghost btn-sm" style="padding:2px 8px;font-size:.75rem;margin-left:3px"
          onclick="refreshPlayerStats('${t.slug}',false)">Jogadores</button>
      </td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <p class="muted small" style="margin-bottom:12px">
      <strong>${scraped_count}/${total}</strong> equipas com dados · Último scrape: ${lastText}
    </p>
    <div style="max-height:380px;overflow-y:auto">
      <table class="standings-table" style="font-size:.85rem;width:100%">
        <thead><tr>
          <th>Cód.</th><th>Seleção</th><th>Estado</th><th>Atualizado</th><th>Resultados</th><th>Jogadores</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

async function scrapeAll() {
  try {
    await API.post('/national-teams/scrape');
    showToast('Scrape de todas as equipas iniciado em background. Atualiza em alguns minutos.');
  } catch (e) { showToast(e.message, 'error'); }
}

async function scrapeSingle(slug, name) {
  try {
    await API.post(`/national-teams/${slug}/scrape`);
    showToast(`Scrape de "${name}" iniciado. Atualiza em alguns segundos.`);
  } catch (e) { showToast(e.message, 'error'); }
}

async function autoSettle() {
  try {
    const r = await API.post('/admin/auto-settle');
    if (r.settled === 0) {
      showToast('Nenhum jogo para liquidar (sem resultados correspondentes ainda).');
    } else {
      showToast(`${r.settled} jogo(s) liquidado(s) automaticamente!`);
      // Reload matches so Resultados tab is up to date
      allMatches = await API.get('/matches') || [];
      for (const m of allMatches) {
        if (!groupMatches[m.group_id]) groupMatches[m.group_id] = [];
      }
      for (const g of ALL_GROUPS) groupMatches[g] = allMatches.filter(m => m.group_id === g);
    }
  } catch (e) { showToast(e.message, 'error'); }
}

// ── Resultados tab helpers ────────────────────────────────────────────────────

function renderActualStandings(g) {
  const ms = groupMatches[g] || [];
  const predsMap = {};
  for (const m of ms) predsMap[m.id] = { home_score: m.home_score, away_score: m.away_score };
  const el = document.createElement('div');
  el.className = 'mt-12';
  renderStandingsTable(calcStandings(ms, predsMap), el);
  return el.innerHTML;
}

function renderAdminMatch(m) {
  const hv    = m.home_score !== null && m.home_score !== undefined ? m.home_score : '';
  const av    = m.away_score !== null && m.away_score !== undefined ? m.away_score : '';
  const badge = m.status === 'finished'
    ? '<span class="badge badge-green">Concluído</span>'
    : '<span class="badge badge-muted">Agendado</span>';

  return `
    <div class="match-block">
      <div class="match-row" style="grid-template-columns:1fr auto 1fr auto;gap:8px">
        <div class="team-home"><span class="team-name-text">${m.home_team}</span><span class="team-flag">${m.home_flag}</span></div>
        <div class="score-box">
          <input type="number" min="0" max="20" id="ah-${m.id}" class="score-input" value="${hv}" placeholder="—">
          <span class="score-sep">:</span>
          <input type="number" min="0" max="20" id="aa-${m.id}" class="score-input" value="${av}" placeholder="—">
        </div>
        <div class="team-away"><span class="team-flag">${m.away_flag}</span><span class="team-name-text">${m.away_team}</span></div>
        <div class="flex gap-8" style="flex-shrink:0">
          ${badge}
          <button class="btn btn-primary btn-sm" onclick="saveResult(${m.id})">Guardar</button>
        </div>
      </div>
      <div class="match-meta">${GROUP_LABELS[m.group_id]} · ${m.match_time} (PT) · ${m.venue}</div>
    </div>`;
}

async function saveResult(id) {
  const h = parseInt(document.getElementById(`ah-${id}`)?.value);
  const a = parseInt(document.getElementById(`aa-${id}`)?.value);
  if (isNaN(h) || isNaN(a) || h < 0 || a < 0) { showToast('Marcador inválido.', 'error'); return; }
  try {
    await API.post('/admin/result', { match_id: id, home_score: h, away_score: a });
    const idx = allMatches.findIndex(m => m.id === id);
    if (idx >= 0) { allMatches[idx].home_score = h; allMatches[idx].away_score = a; allMatches[idx].status = 'finished'; }
    const gid = allMatches[idx]?.group_id;
    if (gid) { const gi = groupMatches[gid].findIndex(m => m.id === id); if (gi >= 0) groupMatches[gid][gi] = allMatches[idx]; }
    renderPanel();
    showToast(`Resultado guardado (${h}–${a})!`);
  } catch (e) { showToast(e.message, 'error'); }
}

function relativeTime(iso) {
  if (!iso) return '—';
  const mins = Math.round((Date.now() - new Date(iso)) / 60000);
  if (mins < 1)   return 'agora';
  if (mins < 60)  return `há ${mins}m`;
  const h = Math.floor(mins / 60);
  if (h   < 24)   return `há ${h}h`;
  return `há ${Math.floor(h / 24)}d`;
}

async function loadAdminStats() {
  try {
    const s = await API.get('/admin/stats');
    const bar = document.getElementById('statsBar');
    bar.style.display = '';
    bar.innerHTML = [
      { v: s.users,                        l: 'Utilizadores' },
      { v: s.predictions,                  l: 'Previsões' },
      { v: `${s.settled}/${s.predictions}`,l: 'Liquidadas' },
      { v: `${s.finished}/${s.matches}`,   l: 'Jogos conc.' },
      { v: `${s.scrapeCount}/48`,          l: 'Seleções c/ dados' },
      { v: relativeTime(s.lastScrape),     l: 'Último Scrape' },
    ].map(x => `<div class="admin-stat">
      <div class="admin-stat-value">${x.v}</div>
      <div class="admin-stat-label">${x.l}</div>
    </div>`).join('');
  } catch { /* stats optional */ }
}

// ── Player stats ──────────────────────────────────────────────────────────────

async function scrapeAllPlayers() {
  if (!confirm('Isto vai fazer scrape dos jogadores de todas as 48 seleções.\nPode demorar várias horas. Continuar?')) return;
  const resultEl = document.getElementById('pstats-result');
  if (resultEl) resultEl.innerHTML = '<span class="muted small">A iniciar...</span>';
  try {
    const r = await API.post('/player-stats/scrape-all');
    if (resultEl) resultEl.innerHTML = `<span class="badge badge-green">Iniciado</span> <span class="muted small">${r.message}</span>`;
  } catch (e) {
    if (resultEl) resultEl.innerHTML = `<span class="form-error">${e.message}</span>`;
  }
}

async function refreshPlayerStats(slug, testMode) {
  const resultEl = document.getElementById('pstats-result');
  if (resultEl) resultEl.innerHTML = '<span class="muted small">A iniciar scrape…</span>';
  try {
    const url = `/player-stats/${slug}/scrape${testMode ? '?test=1' : ''}`;
    const r   = await API.post(url);
    if (resultEl) {
      resultEl.innerHTML =
        `<span class="badge badge-green">Iniciado</span> <span class="muted small">${r.message}</span>`;
    }
    // Refresh status after ~45 s (test: ~20 s)
    setTimeout(() => loadPlayerStatsStatus(), testMode ? 20000 : 45000);
  } catch (e) {
    if (resultEl) resultEl.innerHTML = `<span class="form-error">${e.message}</span>`;
  }
}

async function calcGroup(g) {
  try {
    const r = await API.post(`/admin/group/${g}/points`);
    showToast(`${GROUP_LABELS[g]}: pontos calculados para ${r.count} utilizadores!`);
  } catch (e) { showToast(e.message, 'error'); }
}

// ── Tickets ───────────────────────────────────────────────────────────────────

const TICKET_CAT_LABELS = {
  wrong_result:      'Resultado errado',
  wrong_player_stat: 'Stat jogador',
  login_issue:       'Login / conta',
  prediction_issue:  'Previsões',
  visual_bug:        'Bug visual',
  other:             'Outro',
};

const TICKET_STATUS_BADGES = {
  open:       '<span class="badge badge-muted">Em aberto</span>',
  reviewing:  '<span class="badge badge-orange">Em análise</span>',
  resolved:   '<span class="badge badge-green">Resolvido</span>',
};

async function loadTickets() {
  const el = document.getElementById('ticketList');
  if (!el) return;
  el.innerHTML = '<span class="muted small">A carregar...</span>';
  const filter = document.getElementById('ticketFilter')?.value || '';
  try {
    const tickets = await API.get(`/tickets/admin${filter ? '?status='+filter : ''}`);
    if (!tickets.length) {
      el.innerHTML = '<p class="muted small">Nenhum reporte encontrado.</p>';
      return;
    }
    el.innerHTML = tickets.map(t => `
      <div class="ticket-row">
        <div class="flex-between" style="align-items:flex-start;gap:12px">
          <div style="min-width:0">
            <span class="badge badge-muted" style="font-size:.7rem;margin-right:6px">${TICKET_CAT_LABELS[t.category] || t.category}</span>
            <strong style="font-size:.95rem">${escHtml(t.title)}</strong>
          </div>
          <div class="flex gap-8" style="flex-shrink:0;align-items:center">
            ${TICKET_STATUS_BADGES[t.status] || t.status}
            <select class="input" style="padding:3px 8px;font-size:.78rem;width:auto"
              onchange="updateTicketStatus(${t.id}, this.value, this)">
              <option value="open"      ${t.status==='open'      ? 'selected':''}>Em aberto</option>
              <option value="reviewing" ${t.status==='reviewing' ? 'selected':''}>Em análise</option>
              <option value="resolved"  ${t.status==='resolved'  ? 'selected':''}>Resolvido</option>
            </select>
          </div>
        </div>
        <p class="muted" style="margin:8px 0 4px;font-size:.88rem;white-space:pre-wrap;line-height:1.5">${escHtml(t.description)}</p>
        <div class="ticket-meta">
          <span>📅 ${new Date(t.created_at).toLocaleString('pt-PT')}</span>
          ${t.username ? `<span>👤 @${escHtml(t.username)}</span>` : '<span class="muted">Anónimo</span>'}
          ${t.reference ? `<span>🔖 ${escHtml(t.reference)}</span>` : ''}
          ${t.page_url  ? `<span>🔗 ${escHtml(t.page_url)}</span>`  : ''}
        </div>
      </div>`).join('');
  } catch (e) {
    el.innerHTML = `<span class="form-error">${e.message}</span>`;
  }
}

async function updateTicketStatus(id, status, selectEl) {
  try {
    await API.patch(`/tickets/admin/${id}/status`, { status });
    showToast('Estado atualizado.');
    loadTickets();
  } catch (e) {
    showToast(e.message, 'error');
    if (selectEl) selectEl.value = selectEl.dataset.prev || 'open';
  }
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Users ─────────────────────────────────────────────────────────────────────

let _allUsers = [];

async function loadUsers() {
  const el = document.getElementById('userList');
  if (!el) return;
  el.innerHTML = '<span class="muted small">A carregar...</span>';
  try {
    _allUsers = await API.get('/admin/users');
    renderUsers(_allUsers);
  } catch (e) {
    el.innerHTML = `<span class="form-error">${e.message}</span>`;
  }
}

function filterUsers() {
  const q = (document.getElementById('userSearch')?.value || '').toLowerCase().trim();
  const filtered = q
    ? _allUsers.filter(u =>
        u.username.toLowerCase().includes(q) ||
        (u.email || '').toLowerCase().includes(q) ||
        (u.display_name || '').toLowerCase().includes(q))
    : _allUsers;
  renderUsers(filtered);
}

function renderUsers(users) {
  const el = document.getElementById('userList');
  if (!el) return;
  if (!users.length) { el.innerHTML = '<p class="muted small">Nenhum utilizador encontrado.</p>'; return; }
  el.innerHTML = `
    <div style="overflow-x:auto">
      <table class="standings-table" style="width:100%;font-size:.83rem">
        <thead><tr>
          <th>ID</th><th>Username</th><th>Email</th><th>Prev.</th><th>Tickets</th><th>Estado</th><th>Criado</th><th></th>
        </tr></thead>
        <tbody>${users.map(u => {
          const spamClass = u.ticket_count >= 5 ? 'style="background:rgba(230,29,37,.12)"'
                          : u.ticket_count >= 3 ? 'style="background:rgba(251,146,60,.08)"' : '';
          return `
            <tr id="urow-${u.id}" ${spamClass}>
              <td class="muted">${u.id}</td>
              <td>
                <strong>${escHtml(u.display_name || u.username)}</strong>
                <span class="muted" style="display:block;font-size:.75rem">@${escHtml(u.username)}</span>
              </td>
              <td class="muted" style="font-size:.78rem">${escHtml(u.email)}</td>
              <td>${u.predictions}</td>
              <td>
                ${u.ticket_count > 0
                  ? `<span class="badge ${u.ticket_count >= 5 ? 'badge-red' : u.ticket_count >= 3 ? 'badge-orange' : 'badge-muted'}"
                       title="Tickets enviados">${u.ticket_count}</span>`
                  : '<span class="muted">—</span>'}
              </td>
              <td>
                ${u.is_admin ? '<span class="badge badge-green">Admin</span>' : ''}
                ${u.banned   ? '<span class="badge badge-red">Suspenso</span>' : '<span class="badge badge-muted">Ativo</span>'}
              </td>
              <td class="muted" style="font-size:.75rem;white-space:nowrap">${new Date(u.created_at).toLocaleDateString('pt-PT')}</td>
              <td style="white-space:nowrap">
                ${!u.is_admin ? `
                  <button class="btn btn-ghost btn-sm" style="padding:2px 8px;font-size:.75rem"
                    onclick="banUser(${u.id},'${escHtml(u.username)}',${u.banned})">
                    ${u.banned ? 'Reativar' : 'Suspender'}
                  </button>
                  <button class="btn btn-ghost btn-sm" style="padding:2px 8px;font-size:.75rem;color:var(--primary)"
                    onclick="deleteUser(${u.id},'${escHtml(u.username)}')">
                    Apagar
                  </button>` : ''}
              </td>
            </tr>`;}).join('')}
        </tbody>
      </table>
      <p class="muted small" style="margin-top:10px">${users.length} utilizador${users.length !== 1 ? 'es' : ''}</p>
    </div>`;
}

async function banUser(id, username, isBanned) {
  const action = isBanned ? 'reativar' : 'suspender';
  if (!confirm(`Tens a certeza que queres ${action} @${username}?`)) return;
  try {
    const r = await API.patch(`/admin/users/${id}/ban`);
    showToast(`@${username} ${r.banned ? 'suspenso' : 'reativado'}.`);
    loadUsers();
  } catch (e) { showToast(e.message, 'error'); }
}

async function deleteUser(id, username) {
  if (!confirm(`Apagar a conta de @${username}? Esta ação é irreversível e apaga todas as previsões.`)) return;
  try {
    await API.delete(`/admin/users/${id}`);
    showToast(`Conta @${username} apagada.`);
    loadUsers();
  } catch (e) { showToast(e.message, 'error'); }
}
</script>
</body>
</html>
