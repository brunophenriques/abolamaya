<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salas — A Bola Maya</title>
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('abm_theme')||'dark')</script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/dashboard" class="navbar-brand">
      <div class="brand-bee-wrap">
        <img src="img/logo.png" alt="BM" class="brand-bee"
             onerror="this.parentElement.style.display='none';document.getElementById('nb4').style.display='flex'">
      </div>
      <span class="brand-mark" id="nb4" style="display:none">BM</span>
      A Bola Maya
    </a>
    <div class="navbar-nav">
      <a href="/dashboard">Início</a>
      <a href="/predict">Previsões</a>
      <a href="/leaderboard">Classificação</a>
      <a href="/lobby" class="active always">Salas</a>
      <a href="/admin" id="navAdminLink" style="display:none">Admin</a>
    </div>
    <div class="navbar-right">
      <button class="theme-toggle" onclick="toggleTheme()" title="Alterar tema">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <div class="avatar" id="navAvatar" title="O meu perfil">?</div>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Sair</button>
    </div>
  </div>
</nav>

<main class="container">
  <div class="page-header">
    <h2>Salas</h2>
    <p>Joga contra os teus amigos. Podes estar em várias salas ao mesmo tempo.</p>
  </div>

  <div id="lobbyList"><div class="loading">A carregar...</div></div>

  <div class="cj-grid" style="margin-top:28px">
    <div class="card card-accent-red" style="display:flex;flex-direction:column">
      <div class="card-title">Criar sala</div>
      <div class="form-group" style="flex:1">
        <label>Nome da sala</label>
        <input type="text" id="lobbyName" class="input" placeholder="ex: Turma do Zé">
      </div>
      <button class="btn btn-primary btn-full" onclick="createLobby()">Criar</button>
    </div>
    <div class="card card-accent-blue" style="display:flex;flex-direction:column">
      <div class="card-title">Entrar com código</div>
      <div class="form-group" style="flex:1">
        <label>Código de convite</label>
        <input type="text" id="joinCode" class="input" placeholder="ex: ABC123" maxlength="6"
          style="text-transform:uppercase;letter-spacing:.1em;font-family:monospace;font-size:1.1rem">
      </div>
      <button class="btn btn-blue btn-full" onclick="joinLobby()">Entrar</button>
    </div>
  </div>
</main>

<!-- Lobby modal -->
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;overflow:auto;padding:24px 16px">
  <div style="max-width:680px;margin:0 auto">
    <div class="card">

      <!-- Header -->
      <div class="flex-between mb-4">
        <h3 id="modalTitle" class="fw-bold" style="font-size:1.2rem"></h3>
        <button class="btn btn-ghost btn-sm" onclick="closeModal()" style="font-size:1.1rem;padding:4px 10px;line-height:1">&times;</button>
      </div>
      <p class="muted small mb-16">
        Código:
        <span id="modalCode" class="lobby-code" onclick="copyCode(this)" title="Clica para copiar"></span>
      </p>

      <!-- Tabs inside modal -->
      <div class="tabs" id="modalTabs">
        <button class="tab-btn active" onclick="modalTab('members', this)">Membros</button>
        <button class="tab-btn"        onclick="modalTab('ranking',  this)">Classificação</button>
      </div>

      <!-- Members tab -->
      <div id="modalTabMembers">
        <div id="modalMembers"><div class="loading">A carregar...</div></div>
      </div>

      <!-- Ranking tab -->
      <div id="modalTabRanking" style="display:none">
        <div id="modalLb"><div class="loading">A carregar...</div></div>
      </div>

      <hr class="divider">
      <button class="btn btn-danger btn-sm" id="leaveBtn">Sair da sala</button>
    </div>
  </div>
</div>

<style>
@media(max-width:560px){.cj-grid{grid-template-columns:1fr!important}}

/* ── My lobbies section ───────────────────────────────────── */
.my-lobbies-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 28px 0 14px;
}
.my-lobbies-title {
  font-size: 1.15rem;
  font-weight: 800;
  letter-spacing: -.02em;
  margin: 0;
}
.my-lobbies-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 22px;
  height: 22px;
  padding: 0 7px;
  background: var(--primary);
  color: #fff;
  border-radius: 999px;
  font-size: .75rem;
  font-weight: 700;
}
.my-lobbies-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── Prominent lobby card ─────────────────────────────────── */
.lobby-card-prominent {
  background: var(--card-bg);
  border: 1.5px solid var(--border);
  border-left: 4px solid var(--primary);
  border-radius: var(--radius);
  padding: 16px 18px;
  transition: border-color .15s, box-shadow .15s;
}
.lobby-card-prominent:hover {
  border-color: var(--primary);
  box-shadow: 0 2px 12px rgba(0,0,0,.18);
}
.lobby-card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 14px;
}
.lobby-card-info { flex: 1; min-width: 0; }
.lobby-card-name {
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: -.01em;
  margin-bottom: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.lobby-card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.lobby-member-count {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: .8rem;
  color: var(--muted);
}
.lobby-copy-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  font-family: monospace;
  font-size: .88rem;
  font-weight: 700;
  letter-spacing: .08em;
  color: var(--text);
  cursor: pointer;
  white-space: nowrap;
  transition: background .12s, border-color .12s;
  flex-shrink: 0;
}
.lobby-copy-btn:hover {
  background: var(--card-bg);
  border-color: var(--primary);
  color: var(--primary);
}
.lobby-card-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}
.lobby-card-actions .btn-primary {
  padding: 7px 18px;
  font-size: .88rem;
}
</style>

<footer class="site-footer">
  <div class="footer-inner">
    <span>© 2026 A Bola Maya</span>
    <span class="footer-links">
      <a href="/about">Sobre</a>
      <a href="/information">Dados</a>
      <a href="/terms">Termos</a>
      <a href="/support">Reportar Problema</a>
    </span>
  </div>
</footer>
<script src="js/api.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/theme.js"></script>
<script>
let user, currentLobbyId, currentLobbyCreatedBy;

function rankBadge(i) {
  if (i < 3) return `<span class="rank-badge rank-${i+1}">${i+1}</span>`;
  return String(i + 1);
}

(async () => {
  user = await requireAuth();
  if (!user) return;
  await loadLobbies();
})();

async function loadLobbies() {
  const lobbies = await API.get('/lobbies');
  const el = document.getElementById('lobbyList');
  if (!lobbies || !lobbies.length) {
    el.innerHTML = '<div class="card text-center" style="padding:36px"><p class="muted">Ainda não estás em nenhuma sala.</p><p class="muted small mt-8">Cria uma ou entra com um código de convite.</p></div>';
    return;
  }
  el.innerHTML = `
    <div class="my-lobbies-header">
      <h3 class="my-lobbies-title">As tuas salas</h3>
      <span class="my-lobbies-count">${lobbies.length}</span>
    </div>
    <div class="my-lobbies-list">
      ${lobbies.map(lb => {
        const isOwner = lb.created_by === user.id;
        const safeName = lb.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        return `
        <div class="lobby-card lobby-card-prominent">
          <div class="lobby-card-top">
            <div class="lobby-card-info">
              <div class="lobby-card-name">${lb.name}</div>
              <div class="lobby-card-meta">
                <span class="lobby-member-count">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                  ${lb.member_count} membro${lb.member_count !== 1 ? 's' : ''}
                </span>
                ${isOwner
                  ? '<span class="badge badge-gold" style="font-size:.65rem;padding:2px 7px">Criador</span>'
                  : '<span class="badge badge-muted" style="font-size:.65rem;padding:2px 7px">Membro</span>'}
              </div>
            </div>
            <button class="lobby-copy-btn" onclick="copyLobbyCode('${lb.invite_code}',this)" title="Copiar código de convite">
              <span class="lobby-code-text">${lb.invite_code}</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
          <div class="lobby-card-actions">
            <button class="btn btn-primary btn-sm" onclick="openLobby(${lb.id},'${safeName}','${lb.invite_code}',${lb.created_by})">Abrir sala</button>
            ${isOwner ? `<button class="btn btn-danger btn-sm" onclick="deleteLobby(${lb.id})">Eliminar</button>` : ''}
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

async function createLobby() {
  const name = document.getElementById('lobbyName').value.trim();
  if (!name) { showToast('Dá um nome à sala.', 'error'); return; }
  try {
    await API.post('/lobbies', { name });
    document.getElementById('lobbyName').value = '';
    showToast('Sala criada!');
    await loadLobbies();
  } catch (e) { showToast(e.message, 'error'); }
}

async function joinLobby() {
  const code = document.getElementById('joinCode').value.trim().toUpperCase();
  if (code.length < 4) { showToast('Código inválido.', 'error'); return; }
  try {
    await API.post('/lobbies/join', { code });
    document.getElementById('joinCode').value = '';
    showToast('Entraste na sala!');
    await loadLobbies();
  } catch (e) { showToast(e.message, 'error'); }
}

async function deleteLobby(id) {
  if (!confirm('Eliminar esta sala? Todos os membros serão removidos.')) return;
  await API.delete(`/lobbies/${id}`);
  showToast('Sala eliminada.');
  await loadLobbies();
}

async function openLobby(id, name, code, createdBy) {
  currentLobbyId = id;
  currentLobbyCreatedBy = createdBy;

  document.getElementById('modalTitle').textContent = name;
  document.getElementById('modalCode').textContent  = code;
  document.getElementById('modal').style.display    = '';
  document.getElementById('leaveBtn').onclick = () => leaveLobby(id);

  // Reset to members tab
  modalTab('members', document.querySelector('#modalTabs .tab-btn'));

  // Load both in parallel
  loadModalMembers(id, createdBy);
  loadModalRanking(id);
}

async function loadModalMembers(id, createdBy) {
  document.getElementById('modalMembers').innerHTML = '<div class="loading">A carregar...</div>';
  try {
    const { members } = await API.get(`/lobbies/${id}/members`);
    const isCreator = user.id === createdBy;

    document.getElementById('modalMembers').innerHTML = `
      <div class="member-list">
        ${members.map(m => {
          const mc = m.avatar_color || avatarColor(m.username || '');
          const mi = (m.display_name || m.username || '?').charAt(0).toUpperCase();
          const avatarHtml = m.avatar_url
            ? `<div class="member-avatar" style="background:${mc};overflow:hidden;position:relative"><span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">${mi}</span><img src="${m.avatar_url}" style="width:100%;height:100%;object-fit:cover;position:relative;z-index:1" onerror="this.remove()"></div>`
            : `<div class="member-avatar" style="background:${mc}">${mi}</div>`;
          return `
          <div class="member-row">
            ${avatarHtml}
            <div class="member-name ${m.id === user.id ? 'member-me' : ''}">
              ${m.display_name || m.username}
              ${m.id === createdBy ? '<span class="badge badge-gold" style="margin-left:6px;font-size:.62rem">Criador</span>' : ''}
              ${m.id === user.id && m.id !== createdBy ? '<span class="badge badge-muted" style="margin-left:6px;font-size:.62rem">Tu</span>' : ''}
            </div>
            ${isCreator && m.id !== user.id
              ? `<button class="btn btn-danger btn-sm" onclick="kickMember(${id},${m.id},'${m.display_name || m.username}')">Expulsar</button>`
              : ''}
          </div>`;
        }).join('')}
      </div>
      <p class="muted small mt-12">${members.length} membro${members.length !== 1 ? 's' : ''}</p>`;
  } catch (e) {
    document.getElementById('modalMembers').innerHTML = `<p class="muted">${e.message}</p>`;
  }
}

async function loadModalRanking(id) {
  document.getElementById('modalLb').innerHTML = '<div class="loading">A carregar...</div>';
  try {
    const rows = await API.get(`/leaderboard/lobby/${id}`);
    document.getElementById('modalLb').innerHTML = rows && rows.length ? `
      <table class="lb-table">
        <thead><tr><th>#</th><th>Utilizador</th><th>Jogos</th><th>Grupos</th><th>Total</th></tr></thead>
        <tbody>${rows.map((u, i) => `
          <tr class="${u.id === user.id ? 'me' : ''} ${i < 3 ? 'rank-row-'+(i+1) : ''}">
            <td>${rankBadge(i)}</td>
            <td>${u.display_name || u.username}</td>
            <td>${u.match_points}</td>
            <td>${u.group_points}</td>
            <td class="lb-pts">${u.total_points}</td>
          </tr>`).join('')}
        </tbody>
      </table>` : '<p class="muted">Sem dados ainda.</p>';
  } catch (e) {
    document.getElementById('modalLb').innerHTML = `<p class="muted">${e.message}</p>`;
  }
}

async function kickMember(lobbyId, targetId, targetName) {
  if (!confirm(`Expulsar ${targetName} desta sala?`)) return;
  try {
    await API.delete(`/lobbies/${lobbyId}/members/${targetId}`);
    showToast(`${targetName} foi expulso.`);
    loadModalMembers(lobbyId, currentLobbyCreatedBy);
    loadModalRanking(lobbyId);
    await loadLobbies();
  } catch (e) { showToast(e.message, 'error'); }
}

async function leaveLobby(id) {
  if (!confirm('Sair desta sala?')) return;
  await API.post(`/lobbies/${id}/leave`);
  closeModal();
  showToast('Saíste da sala.');
  await loadLobbies();
}

function modalTab(tab, btn) {
  document.querySelectorAll('#modalTabs .tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('modalTabMembers').style.display = tab === 'members' ? '' : 'none';
  document.getElementById('modalTabRanking').style.display  = tab === 'ranking'  ? '' : 'none';
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }
function copyCode(el) { navigator.clipboard.writeText(el.textContent).then(() => showToast('Código copiado!')); }

function copyLobbyCode(code, btn) {
  navigator.clipboard.writeText(code).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '<span style="font-size:.75rem;font-weight:700;color:var(--green,#22c55e)">Copiado!</span>';
    setTimeout(() => { btn.innerHTML = orig; }, 1800);
  });
}
</script>
</body>
</html>
