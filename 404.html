<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — A Bola Maya</title>
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('abm_theme')||'dark')</script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/dashboard" class="navbar-brand">
      <div class="brand-bee-wrap">
        <img src="img/logo.png" alt="BM" class="brand-bee"
             onerror="this.parentElement.style.display='none';document.getElementById('nb-404').style.display='flex'">
      </div>
      <span class="brand-mark" id="nb-404" style="display:none">BM</span>
      A Bola Maya
    </a>
    <div class="navbar-nav">
      <a href="/dashboard" class="always">Início</a>
      <a href="/predict" class="always">Previsões</a>
    </div>
    <div class="navbar-right">
      <button class="theme-toggle" onclick="toggleTheme()" title="Alterar tema">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <div class="avatar" id="navAvatar" style="display:none" title="O meu perfil">?</div>
      <button class="btn btn-ghost btn-sm" id="navLogout" style="display:none" onclick="logout()">Sair</button>
    </div>
  </div>
</nav>

<main class="container" style="padding-bottom:48px">
  <div style="text-align:center;padding:80px 20px 40px">
    <div style="font-size:5rem;font-weight:900;color:var(--primary);letter-spacing:-.04em;line-height:1">404</div>
    <h2 style="margin:16px 0 8px;font-size:1.4rem">Página não encontrada</h2>
    <p class="muted" style="margin-bottom:32px;max-width:360px;margin-left:auto;margin-right:auto;line-height:1.6">
      Esta página não existe ou foi movida.<br>
      Não fiques aí parado — vai para o início.
    </p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <a href="/dashboard" class="btn btn-primary">Ir para o Início</a>
      <a href="/predict" class="btn btn-ghost">Ver Previsões</a>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <span>© 2026 A Bola Maya</span>
    <span class="footer-links">
      <a href="/about">Sobre</a>
      <a href="/information">Dados</a>
      <a href="/terms">Termos</a>
      <a href="/support">Reportar Problema</a>
    </span>
  </div>
</footer>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/theme.js"></script>
<script>
(async () => {
  if (!localStorage.getItem('abm_token')) return;
  try {
    const user = await API.get('/me');
    setupNavbar(user);
    document.getElementById('navAvatar').style.display = '';
    document.getElementById('navLogout').style.display = '';
  } catch { localStorage.removeItem('abm_token'); }
})();
</script>
</body>
</html>
