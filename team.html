<script>
// Slugify a team name to match JSON filenames and folder names
function teamSlug(name) {
  return name
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .toLowerCase()
    .replace(/[^a-z0-9\s]/g, '')
    .trim()
    .replace(/\s+/g, '-');
}

function calcAge(born) {
  if (!born) return '';
  const d = new Date(born), now = new Date();
  let age = now.getFullYear() - d.getFullYear();
  if (now < new Date(now.getFullYear(), d.getMonth(), d.getDate())) age--;
  return age;
}

const POS_LABELS = { GR: 'Guarda-Redes', DEF: 'Defesas', MED: 'Médios', AV: 'Avançados' };
const POS_ORDER  = ['GR', 'DEF', 'MED', 'AV'];

// Group colour class per group (matches the CSS gc-X system)
const GROUP_COLOR_CLASS = {
  A:'gc-A', B:'gc-B', C:'gc-C', D:'gc-D', E:'gc-E', F:'gc-F',
  G:'gc-G', H:'gc-H', I:'gc-I', J:'gc-J', K:'gc-K', L:'gc-L',
};

// Global caches populated as squad renders + stats load
let squadPlayerCache = {};   // normName(squad name) → { p, slug, gcClass }
let statsList        = [];   // raw array from API
let statsByNumber    = {};   // shirt_number → stat
let statsByPlayerId  = {};   // soccerway_player_id → stat

(async () => {
  const user = await requireAuth();
  if (!user) return;

  const params = new URLSearchParams(location.search);
  const slug = params.get('team');
  if (!slug) { renderError('Nenhuma seleção especificada.'); return; }

  let squad;
  try {
    const res = await fetch(`data/squads/${slug}.json`);
    if (!res.ok) throw new Error('Ficheiro não encontrado');
    squad = await res.json();
  } catch {
    renderUnderConstruction();
    return;
  }

  renderSquad(squad, slug);
  loadTeamForm(slug, squad.name);
  loadPlayerStats(slug);
})();

function renderError(msg) {
  document.getElementById('teamContent').innerHTML = `
    <div class="card text-center" style="padding:48px;margin-top:24px">
      <p style="font-size:1.4rem;font-weight:700;margin-bottom:12px">Seleção não disponível</p>
      <p class="muted">${msg}</p>
      <a href="javascript:history.back()" class="btn btn-ghost btn-sm" style="margin-top:16px">Voltar</a>
    </div>`;
}

function renderUnderConstruction() {
  document.getElementById('teamContent').innerHTML = `
    <div class="card text-center" style="padding:48px 24px;margin-top:24px">
      <div style="font-size:4rem;margin-bottom:16px">🚧</div>
      <p style="font-size:1.6rem;font-weight:700;margin-bottom:8px">Página em Construção</p>
      <p class="muted" style="margin-bottom:24px">Esta seleção ainda não está disponível. Deixa de ser guloso e volta mais tarde!</p>
      <img src="img/construction.jpg" alt="Em construção"
           style="width:100%;max-width: 500px;border-radius:12px;margin-bottom:24px;object-fit:cover">
      <br>
      <a href="javascript:history.back()" class="btn btn-ghost btn-sm">Voltar</a>
    </div>`;
}

function renderSquad(squad, slug) {
  const gcClass = GROUP_COLOR_CLASS[squad.group] || '';
  document.title = `${squad.name} — A Bola Maya`;

  // Group players by position
  const byPos = { GR:[], DEF:[], MED:[], AV:[] };
  for (const p of squad.players || []) byPos[p.pos]?.push(p);

  document.getElementById('teamContent').innerHTML = `
    <!-- Header -->
    <div class="squad-header ${gcClass}">
      <img src="img/trophy.png"      class="squad-trophy trophy-dark"  aria-hidden="true" onerror="this.style.display='none'">
      <img src="img/trophyblack.png" class="squad-trophy trophy-light" aria-hidden="true" onerror="this.style.display='none'">
      <div class="squad-flag">${squad.flag}</div>
      <div class="squad-info">
        <h1>${squad.name}</h1>
        <div class="squad-meta">
          <span class="badge ${gcClass.replace('gc-','badge-')||'badge-muted'}" style="font-size:.72rem">Grupo ${squad.group}</span>
          <a href="predict.html?group=${squad.group}" class="btn btn-ghost btn-sm" style="font-size:.75rem;padding:4px 10px">Ver jogos</a>
        </div>
        <div class="squad-manager">Treinador: <strong>${squad.manager || '—'}</strong></div>
      </div>
    </div>

    <!-- Recent Form (populated asynchronously by loadTeamForm) -->
    <div id="teamFormSection" class="team-form-section">
      <div class="team-form-title">Forma Recente</div>
      <div class="form-badges" id="formBadges">
        <span class="form-loading">A carregar...</span>
      </div>
    </div>

    <div style="margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">
      <p class="muted small">${squad.players?.length || 0} convocados</p>
      <a href="javascript:history.back()" class="btn btn-ghost btn-sm">Voltar</a>
    </div>

    <!-- Players by position -->
    ${POS_ORDER.filter(pos => byPos[pos].length > 0).map(pos => `
      <div class="position-section ${gcClass}">
        <div class="position-label">${POS_LABELS[pos]} (${byPos[pos].length})</div>
        <div class="player-grid">
          ${byPos[pos].sort((a,b) => a.number - b.number).map(p => renderPlayerCard(p, slug, gcClass)).join('')}
        </div>
      </div>`).join('')}`;
}

async function loadTeamForm(slug, teamName) {
  const badges = document.getElementById('formBadges');
  if (!badges) return;

  // DP = draw that went to penalties (equal FT score, result W or L)
  const TITLE = { W: 'Vitória', D: 'Empate', L: 'Derrota', DP: 'Penáltis' };
  const DOT   = { W: 'fw',     D: 'fd',     L: 'fl',      DP: 'fd'       };
  const LABEL = { W: 'V',      D: 'E',      L: 'D',       DP: 'D'        };

  function renderBadges(form) {
    return form.map(f => {
      const r = f.result || 'D';
      const dotInner = r === 'DP'
        ? `D<sup style="font-size:.55em;line-height:1;vertical-align:super;margin-left:1px">p</sup>`
        : (LABEL[r] || r);
      return `
        <div class="form-badge" title="${TITLE[r] || r} vs ${f.opponent} (${f.score})${f.competition ? ' · ' + f.competition : ''}">
          <div class="form-badge-dot ${DOT[r] || 'fd'}">${dotInner}</div>
          <div class="form-badge-score">${f.score}</div>
          <div class="form-badge-meta">${f.opponent}</div>
        </div>`;
    }).join('');
  }

  try {
    // ── 1. Try local scraped data ─────────────────────────────────────────
    const scraped = await API.get('/national-teams/' + slug + '/results');
    const results = scraped?.results ?? [];

    if (results.length > 0) {
      const form = results.map(r => {
        // Penalty shootout: FT scores are equal but result is W or L
        const isPenalty = r.home_score === r.away_score && r.result_for_team !== 'D';

        // Determine home/away:
        // 1. Use team_is_home stored by scraper (most reliable — knows Soccerway name)
        // 2. For non-penalty W/L, infer from result + score (no name matching needed)
        // 3. Fall back to name matching (may fail for teams with different Soccerway names)
        let weAreHome;
        if (r.team_is_home !== null && r.team_is_home !== undefined) {
          weAreHome = r.team_is_home === 1;
        } else if (!isPenalty && r.result_for_team === 'W') {
          weAreHome = r.home_score > r.away_score;
        } else if (!isPenalty && r.result_for_team === 'L') {
          weAreHome = r.home_score < r.away_score;
        } else {
          // Draw or penalty: scores are equal, score display is correct either way
          // Just try name matching for opponent label
          const norm = s => (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]/g,'');
          const tname = scraped.team?.name || teamName;
          const na = norm(r.home_team), nb = norm(tname);
          weAreHome = na === nb || na.includes(nb) || nb.includes(na);
        }

        return {
          result:      isPenalty ? 'DP' : r.result_for_team,
          opponent:    weAreHome ? r.away_team : r.home_team,
          score:       weAreHome
            ? `${r.home_score}-${r.away_score}`
            : `${r.away_score}-${r.home_score}`,
          competition: r.competition,
        };
      });
      badges.innerHTML = renderBadges(form);
      return;
    }

    // ── 2. Fallback: external API-Football ────────────────────────────────
    const ext  = await API.get('/football/form?team=' + encodeURIComponent(teamName));
    const form = ext?.form ?? [];
    if (!form.length) {
      badges.innerHTML = '<span class="form-error">Sem resultados recentes disponíveis.</span>';
      return;
    }
    badges.innerHTML = renderBadges(form);
  } catch {
    badges.innerHTML = '<span class="form-error">Forma não disponível.</span>';
  }
}

// ── Player national team stats ─────────────────────────────────────────────

// Normalize a name for fuzzy matching (remove accents, lowercase, letters only)
function normPlayerName(s) {
  return (s || '')
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .toLowerCase()
    .replace(/[^a-z]/g, '');
}

// Returns 0–1 Jaccard similarity on name tokens.
// Handles reversed order ("Costa Diogo" ↔ "Diogo Costa"),
// accents, and single-token names like "Vitinha".
function nameSimilarity(a, b) {
  const normA = normPlayerName(a);
  const normB = normPlayerName(b);
  if (normA === normB) return 1;

  const toksA = new Set(a.split(/\s+/).map(normPlayerName).filter(t => t.length > 1));
  const toksB = new Set(b.split(/\s+/).map(normPlayerName).filter(t => t.length > 1));

  // Single-token fallback: substring check
  if (toksA.size <= 1 || toksB.size <= 1) {
    return (normA.includes(normB) || normB.includes(normA)) ? 0.6 : 0;
  }

  const common = [...toksA].filter(t => toksB.has(t)).length;
  const union  = new Set([...toksA, ...toksB]).size;
  return union > 0 ? common / union : 0;
}

// Keep for external callers that still use boolean API
function matchPlayerName(a, b) { return nameSimilarity(a, b) >= 0.5; }

function renderStatsMini(stat) {
  if (!stat || stat.appearances === null) return '';
  const row = [
    { v: stat.appearances,  l: 'Jogos' },
    { v: stat.goals,        l: 'Gls' },
    { v: stat.assists,      l: 'Ast' },
    { v: stat.yellow_cards, l: '🟨' },
    { v: stat.red_cards,    l: '🟥' },
    { v: stat.saves_pct,    l: 'SV%' },
    { v: stat.clean_sheets, l: 'CS' },
  ].filter(x => x.v !== null && x.v !== undefined);
  if (!row.length) return '';
  return `<div class="player-nat-stats">${
    row.map(x => `<span class="pns-item"><span class="pns-val">${x.v}</span><span class="pns-lbl">${x.l}</span></span>`).join('')
  }</div>`;
}

// Find the best-matching stat record for a player.
// Priority: jersey number (exact) → best similarity score among all records.
function findStatFor(name, shirtNumber) {
  if (!statsList.length) return null;

  // 1. Jersey number exact hit — fastest and most reliable path
  if (shirtNumber && statsByNumber[shirtNumber]) {
    const byNum = statsByNumber[shirtNumber];
    // Quick sanity: at least one name token must overlap (avoids wrong hit
    // if Soccerway assigns a different number to a similarly-named player)
    if (nameSimilarity(byNum.player_name, name) >= 0.2) return byNum;
  }

  // 2. Best similarity score across all records (handles reversed names,
  //    missing jersey numbers, accent differences)
  let best = null, bestScore = 0;
  for (const s of statsList) {
    const score = nameSimilarity(s.player_name, name);
    if (score > bestScore) { bestScore = score; best = s; }
  }

  // Require ≥50% token overlap to avoid false positives
  return bestScore >= 0.5 ? best : null;
}

async function loadPlayerStats(slug) {
  try {
    const data = await API.get(`/player-stats/${slug}`);
    console.log(`[playerStats] API response: ${data.count} players for "${slug}"`);
    if (!data.players?.length) return;

    statsList     = data.players;
    statsByNumber = {};
    statsByPlayerId = {};
    for (const s of data.players) {
      if (s.shirt_number)        statsByNumber[s.shirt_number]       = s;
      if (s.soccerway_player_id) statsByPlayerId[s.soccerway_player_id] = s;
    }
    console.log(`[playerStats] Cache built — byNumber keys: [${Object.keys(statsByNumber).join(', ')}]`);

    // Inject mini stats into each card
    document.querySelectorAll('[data-player-name]').forEach(card => {
      const stat = findStatFor(card.dataset.playerName, parseInt(card.dataset.playerNumber) || null);
      const el   = card.querySelector('.player-nat-stats');
      if (el && stat) el.outerHTML = renderStatsMini(stat);
    });
  } catch (e) {
    console.warn(`[playerStats] loadPlayerStats failed:`, e.message);
  }
}

function renderPlayerCard(p, slug, gcClass) {
  // Store squad data for modal lookup
  squadPlayerCache[normPlayerName(p.name)] = { p, slug, gcClass };

  const age   = calcAge(p.born);
  const photo = `img/squads/${slug}/${teamSlug(p.name)}.jpg`;
  const num   = p.number ?? '?';
  const imgEl = `<img src="${photo}" alt="${p.name}" class="player-photo"
                      onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                 <div class="player-photo-placeholder" style="display:none">${num}</div>`;

  return `
    <div class="player-card" data-player-name="${p.name}" data-player-number="${num}" onclick="openPlayerModal(this)">
      <div class="player-photo-wrap">
        ${imgEl}
        <span class="player-number-badge ${gcClass}">${num}</span>
      </div>
      <div class="player-info">
        <div class="player-name" title="${p.name}">${p.name}</div>
        <div class="player-club">${p.club}${age ? ` · ${age} anos` : ''}</div>
        <div class="player-nat-stats"></div>
      </div>
    </div>`;
}

// ── Player modal ──────────────────────────────────────────────────────────────

function relativeScrapedTime(iso) {
  if (!iso) return '';
  const mins = Math.round((Date.now() - new Date(iso)) / 60000);
  if (mins < 1)  return 'agora mesmo';
  if (mins < 60) return `há ${mins}m`;
  const h = Math.floor(mins / 60);
  if (h < 24)   return `há ${h}h`;
  return `há ${Math.floor(h / 24)}d`;
}

function openPlayerModal(cardEl) {
  const name   = cardEl.dataset.playerName;
  const number = parseInt(cardEl.dataset.playerNumber) || null;

  const cached = squadPlayerCache[normPlayerName(name)]
    || Object.values(squadPlayerCache).find(c => matchPlayerName(c.p.name, name));
  if (!cached) return;

  const { p, slug, gcClass } = cached;
  const stat  = findStatFor(p.name, number);

  // Debug
  console.log(`[modal] Opened: "${p.name}" #${number}`);
  console.log(`[modal] stat found:`, stat);
  console.log(`[modal] statsByNumber keys:`, Object.keys(statsByNumber));

  const age   = calcAge(p.born);
  const photo = `img/squads/${slug}/${teamSlug(p.name)}.jpg`;
  const num   = p.number ?? '?';
  const isGK  = p.pos === 'GR';

  const fmt = v => (v === null || v === undefined) ? '-' : v;

  function statsGrid(s, gk) {
    const cells = gk
      ? [
          { v: fmt(s.appearances),  l: 'Jogos' },
          { v: fmt(s.clean_sheets), l: 'Sem sofrer' },
          { v: fmt(s.saves_pct),    l: '% Defesas' },
          { v: fmt(s.yellow_cards), l: 'Amarelos' },
          { v: fmt(s.red_cards),    l: 'Vermelhos' },
        ]
      : [
          { v: fmt(s.appearances),  l: 'Jogos' },
          { v: fmt(s.goals),        l: 'Golos' },
          { v: fmt(s.assists),      l: 'Assist.' },
          { v: fmt(s.yellow_cards), l: 'Amarelos' },
          { v: fmt(s.red_cards),    l: 'Vermelhos' },
        ];
    return `<div class="pmodal-stats-grid">${cells.map(x => `
        <div class="pmodal-stat-cell">
          <div class="pmodal-stat-val">${x.v}</div>
          <div class="pmodal-stat-lbl">${x.l}</div>
        </div>`).join('')}</div>`;
  }

  let statsHtml;
  if (!stat) {
    statsHtml = `<p class="muted small" style="text-align:center;margin-top:8px">
      Estatísticas ainda não disponíveis.<br>Pede ao admin para fazer refresh.</p>`;
  } else {
    statsHtml = `
      <div class="pmodal-stats-title">Seleções Soccerway</div>
      ${statsGrid(stat, isGK)}
      ${stat.scraped_at
        ? `<div class="pmodal-updated muted small">Atualizado ${relativeScrapedTime(stat.scraped_at)}</div>`
        : ''}
      <div class="pmodal-note muted small">Inclui seleções jovens quando registadas no Soccerway.</div>`;
  }

  const badgeClass = gcClass.replace('gc-', 'badge-') || 'badge-muted';

  document.getElementById('playerModalContent').innerHTML = `
    <div class="pmodal-hero">
      <div class="pmodal-photo-wrap">
        <img src="${photo}" alt="${p.name}" class="pmodal-photo"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="pmodal-photo-placeholder ${gcClass}">${num}</div>
      </div>
      <div class="pmodal-player-info">
        <div class="pmodal-name">${p.name}</div>
        <div class="pmodal-meta">${p.club}${age ? ` · ${age} anos` : ''}</div>
        <div class="pmodal-pos">
          <span class="badge ${badgeClass}" style="font-size:.7rem">#${num}</span>
          <span class="badge badge-muted" style="font-size:.7rem">${POS_LABELS[p.pos] || p.pos}</span>
        </div>
      </div>
    </div>
    <hr class="pmodal-divider">
    ${statsHtml}
  `;

  document.getElementById('playerModal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closePlayerModal() {
  document.getElementById('playerModal').style.display = 'none';
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePlayerModal();
});
</script>
<!-- Player modal -->
<div id="playerModal" class="player-modal-overlay" style="display:none" onclick="closePlayerModal()">
  <div class="player-modal-box" onclick="event.stopPropagation()">
    <button class="player-modal-close" onclick="closePlayerModal()" aria-label="Fechar">&times;</button>
    <div id="playerModalContent"></div>
  </div>
</div>
