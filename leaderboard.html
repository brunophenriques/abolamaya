<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classificação — A Bola Maya</title>
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('abm_theme')||'dark')</script>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/dashboard" class="navbar-brand">
      <div class="brand-bee-wrap">
        <img src="img/logo.png" alt="BM" class="brand-bee"
             onerror="this.parentElement.style.display='none';document.getElementById('nb3').style.display='flex'">
      </div>
      <span class="brand-mark" id="nb3" style="display:none">BM</span>
      <span class="navbar-brand-text">A Bola Maya</span>
    </a>
    <div class="navbar-nav">
      <a href="/dashboard">Início</a>
      <a href="/predict">Previsões</a>
      <a href="/leaderboard" class="active always">Classificação</a>
      <a href="/lobby">Salas</a>
      <a href="/admin" id="navAdminLink" style="display:none">Admin</a>
    </div>
    <div class="navbar-right">
      <button class="theme-toggle" onclick="toggleTheme()" title="Alterar tema">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <div class="avatar" id="navAvatar" title="O meu perfil">?</div>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Sair</button>
      <button class="nav-hamburger" id="navHamburger" onclick="toggleNavMenu()" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>

<main class="container">
  <div class="page-header">
    <h2>Classificação</h2>
    <p>Mundial 2026 · Fase de Grupos</p>
  </div>

  <div class="tabs" id="lbTabs">
    <button class="tab-btn active" onclick="switchTab('global', this)">Global</button>
    <button class="tab-btn" onclick="switchTab('friends', this)">Amigos</button>
    <span id="lobbyTabs" style="display:contents"></span>
  </div>

  <div id="lbContent"><div class="loading">A carregar...</div></div>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <span>© 2026 A Bola Maya</span>
    <span class="footer-links">
      <a href="/about">Sobre</a>
      <a href="/information">Dados</a>
      <a href="/terms">Termos</a>
      <a href="/support">Reportar Problema</a>
    </span>
  </div>
</footer>
<script src="js/api.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/theme.js"></script>
<script>
let user, globalData = [];

(async () => {
  user = await requireAuth();
  if (!user) return;

  const [lb, lobbies] = await Promise.all([API.get('/leaderboard'), API.get('/lobbies')]);
  globalData = lb || [];

  const lobbyTabsEl = document.getElementById('lobbyTabs');
  for (const l of lobbies || []) {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.textContent = l.name;
    btn.onclick = () => switchTab(l.id, btn);
    lobbyTabsEl.appendChild(btn);
  }

  renderTable(globalData);
})();

async function switchTab(tab, btn) {
  document.querySelectorAll('#lbTabs .tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('lbContent').innerHTML = '<div class="loading">A carregar...</div>';
  if (tab === 'global') {
    renderTable(globalData);
  } else if (tab === 'friends') {
    try { renderTable(await API.get('/friends/leaderboard')); }
    catch (e) { document.getElementById('lbContent').innerHTML = `<p class="muted">${e.message}</p>`; }
  } else {
    try { renderTable(await API.get(`/leaderboard/lobby/${tab}`)); }
    catch (e) { document.getElementById('lbContent').innerHTML = `<p class="muted">${e.message}</p>`; }
  }
}

function miniAvatar(u) {
  const color   = u.avatar_color || avatarColor(u.username || '');
  const initial = (u.display_name || u.username || '?').charAt(0).toUpperCase();
  const base    = `width:30px;height:30px;border-radius:50%;flex-shrink:0;background:${color};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.78rem;overflow:hidden;position:relative`;
  if (u.avatar_url) {
    return `<div style="${base}">
      <span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">${initial}</span>
      <img src="${u.avatar_url}" style="width:100%;height:100%;object-fit:cover;position:relative;z-index:1" onerror="this.remove()">
    </div>`;
  }
  return `<div style="${base}">${initial}</div>`;
}

function renderTable(rows) {
  if (!rows.length) {
    document.getElementById('lbContent').innerHTML =
      '<div class="card"><p class="muted text-center" style="padding:28px">Ainda sem jogadores.</p></div>';
    return;
  }
  document.getElementById('lbContent').innerHTML = `
    <div class="card" style="padding:0;overflow:hidden">
      <table class="lb-table">
        <thead><tr>
          <th class="lb-rank">#</th>
          <th class="lb-avatar"></th>
          <th>Utilizador</th>
          <th class="lb-accuracy" title="Previsões corretas / total">Precisão</th>
          <th>Pts Jogos</th>
          <th>Pts Grupos</th>
          <th>Total</th>
        </tr></thead>
        <tbody>${rows.map((u, i) => {
          const rankCls = i < 3 ? `rank-row-${i+1}` : '';
          const meCls   = u.id === user.id ? 'me' : '';
          const rank    = i < 3
            ? `<span class="rank-badge rank-${i+1}">${i+1}</span>`
            : `<span style="color:var(--muted)">${i+1}</span>`;
          const adminBadge = u.is_admin ? `<span class="lb-admin" title="Admin">👑</span>` : '';
          const accuracyLabel = u.predictions_made > 0 ? `${u.accuracy}%` : '—';
          return `<tr class="${rankCls} ${meCls}">
            <td class="lb-rank">${rank}</td>
            <td class="lb-avatar">
              <a href="/profile?u=${u.username}" style="text-decoration:none">${miniAvatar(u)}</a>
            </td>
            <td>
              <a href="/profile?u=${u.username}" style="text-decoration:none;color:var(--text)">
                <strong>${u.display_name || u.username}</strong> ${adminBadge}
                ${u.id === user.id ? '<span class="badge badge-red" style="font-size:.62rem">Tu</span>' : ''}
              </a>
              <br><span class="lb-sub">@${u.username}</span>
            </td>
            <td class="lb-accuracy">${accuracyLabel}</td>
            <td>${u.match_points}</td>
            <td>${u.group_points}</td>
            <td class="lb-pts">${u.total_points}</td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>
    </div>
    <p class="muted small mt-8 text-center">1 pt resultado · 3 pts marcador exato · 1–4 pts classificação de grupo</p>`;
}
</script>
</body>
</html>
